<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Condividi foto e video del nostro matrimonio in modo semplice da smartphone o desktop.">
    <title>Festa di Laurea</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260713-10">
</head>
<body>
    <div class="page-shell">
        <div class="background-glow background-glow-left" aria-hidden="true"></div>
        <div class="background-glow background-glow-right" aria-hidden="true"></div>

        <section class="panels" aria-label="File selezionati">
            <article id="capture-panel" class="upload-card is-hidden" aria-live="polite">
                <div class="card-header">
                    <div>
                        <p class="card-kicker">Anteprima</p>
                    </div>
                </div>

                <div id="capture-preview-list" class="preview-grid"></div>

                <div class="card-footer">
                    <p id="capture-summary" class="selection-summary">Nessun file selezionato</p>
                    <button id="capture-upload-btn" class="secondary-action" type="button" aria-label="Carica il file appena acquisito" disabled>
                        Carica
                    </button>
                </div>
            </article>

            <article id="select-panel" class="upload-card is-hidden" aria-live="polite">
                <div class="card-header">
                    <div>
                        <p class="card-kicker">Anteprima</p>
                    </div>
                </div>

                <div id="select-preview-list" class="preview-grid"></div>

                <div class="card-footer">
                    <p id="select-summary" class="selection-summary">Nessun file selezionato</p>
                    <button id="select-upload-btn" class="secondary-action" type="button" aria-label="Carica i file selezionati" disabled>
                        Carica
                    </button>
                </div>
            </article>
        </section>

        <main class="hero" aria-labelledby="site-title">
            <!-- <p class="eyebrow">Un giorno da ricordare</p> -->
            <p class="subtitle"> 17/07/2026 </p>
            <h1 id="site-title" >Dottoressa Sara</h1>
            <section class="title-photo" aria-label="Foto festeggiata">
                <img src="assets/sara.jpg" alt="Foto di Sara" class="title-photo-image">
            </section>
            

            <section class="actions" aria-label="Azioni principali">
                <button
                    id="capture-btn"
                    class="primary-action"
                    type="button"
                    aria-label="Scatta una foto o registra un video"
                >
                    <span class="action-emoji" aria-hidden="true"> Scatta una foto</span>
                </button>
                
                <button
                    id="select-btn"
                    class="primary-action"
                    type="button"
                    aria-label="Seleziona foto o video dalla galleria del dispositivo"
                >
                    <span class="action-emoji" aria-hidden="true"> Carica una foto</span>
                </button>

                <button
                    id="open-gallery-btn"
                    class="primary-action"
                    type="button"
                    aria-label="Apri la galleria su Google Drive"
                >
                    <span class="action-emoji" aria-hidden="true"> Vedi la galleria</span>
                </button>
            </section>

            <input
                id="capture-input"
                class="sr-only"
                type="file"
                accept="image/*"
                capture="environment"
                aria-label="Scatta una foto con la fotocamera"
            >

            <input
                id="select-input"
                class="sr-only"
                type="file"
                accept="image/*,video/*"
                multiple
                aria-label="Seleziona foto o video dalla galleria del dispositivo"
            >
        </main>
    </div>

    <div id="upload-overlay" class="upload-overlay is-hidden" aria-hidden="true">
        <div class="overlay-card" role="status" aria-live="assertive">
            <div class="loader-spinner" aria-hidden="true"></div>
            <h2>Caricamento in corso...</h2>
            <p id="overlay-status-text">Preparazione upload</p>
            <div class="progress-track" aria-hidden="true">
                <div id="overlay-progress-bar" class="progress-bar"></div>
            </div>
            <p id="overlay-progress-text" class="progress-label">0%</p>
        </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <div id="preview-lightbox" class="preview-lightbox is-hidden" aria-hidden="true" role="dialog" aria-label="Anteprima immagine a schermo intero">
        <button id="lightbox-close-btn" type="button" class="lightbox-close" aria-label="Chiudi anteprima">✕</button>
        <img id="lightbox-image" class="lightbox-image" alt="Anteprima immagine a schermo intero">
    </div>

    <script src="js/config.js?v=20260713-10"></script>
    <script src="js/upload.js?v=20260713-10"></script>
    <script src="js/app.js?v=20260713-10"></script>
</body>
</html>
